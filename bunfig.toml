# Bun configuration for prjct-cli
# https://bun.sh/docs/runtime/bunfig

[install]
# Install production dependencies by default
production = false

# Install optional dependencies
optional = true

# Peer dependencies behavior
peer = true

[install.scopes]
# Registry configuration for @prjct scope
"@prjct" = { url = "https://registry.npmjs.org/" }

[run]
# Enable shell execution for scripts
shell = "bash"

# Scripts compatibility
bun = true

[test]
# Test configuration (for future test implementation)
preload = []
