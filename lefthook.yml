# lefthook.yml - Git hooks for prjct-cli
# Prevents commits with lint/format errors
# CI has its own checks - skip hooks there

# Skip in CI environments
skip_in_ci: true

pre-commit:
  parallel: true
  commands:
    check:
      glob: "*.{ts,tsx,js,jsx,json,md}"
      run: npm run check
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: npm run typecheck
    test:
      run: npm test
