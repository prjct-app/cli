# lefthook.yml - Git hooks for prjct-cli
# Fast, portable checks that work with npm (no bun required)
# Tests run in CI where bun is properly installed

pre-commit:
  parallel: true
  commands:
    check:
      glob: "*.{ts,tsx,js,jsx,json,md}"
      run: npm run check
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: npm run typecheck
