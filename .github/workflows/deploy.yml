name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'lp/package-lock.json'

      - name: Install dependencies
        run: |
          cd lp
          npm ci || npm install

      - name: Build landing page
        run: |
          cd lp
          npm run build
          # The build output is now in /docs directory

      - name: Prepare deployment directory
        run: |
          # Copy the built files from docs directory
          mkdir -p ./deploy
          cp -r docs/* ./deploy/
          # Make sure install.sh is executable
          if [ -f "./deploy/install.sh" ]; then
            chmod +x ./deploy/install.sh
          fi
          # Ensure CNAME file is in deployment directory
          if [ -f "lp/CNAME" ]; then
            cp lp/CNAME ./deploy/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4