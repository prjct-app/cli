name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'website/package-lock.json'

      - name: Install dependencies
        run: |
          cd website
          npm ci || npm install

      - name: Build website
        run: |
          cd website
          npm run build
          # The build output is now in /docs directory

      - name: Copy install.sh to docs
        run: |
          if [ -f "website/public/install.sh" ]; then
            cp website/public/install.sh docs/install.sh
            chmod +x docs/install.sh
            echo "✅ Copied install.sh to docs/"
          fi

      - name: Commit build output to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --staged --quiet || git commit -m "build: update website build output [skip ci]"
          git push || echo "No changes to push"

      - name: Prepare deployment directory
        run: |
          # Copy the built files from docs directory
          mkdir -p ./deploy
          cp -r docs/* ./deploy/

          # Copy the latest install.sh to deployment directory
          if [ -f "./scripts/install.sh" ]; then
            cp ./scripts/install.sh ./deploy/install.sh
            echo "✅ Copied updated install.sh to deployment directory"
          fi

          # Make sure install.sh is executable
          if [ -f "./deploy/install.sh" ]; then
            chmod +x ./deploy/install.sh
          fi

          # Ensure CNAME file is in deployment directory (now in public)
          if [ -f "docs/CNAME" ]; then
            echo "CNAME already in docs directory"
          elif [ -f "website/public/CNAME" ]; then
            cp website/public/CNAME ./deploy/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4