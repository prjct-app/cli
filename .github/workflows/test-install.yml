name: Test Installation Methods

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-bun:
    name: Test Bun Installation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Test bun installation (local)
        run: |
          bun install
          bun link

      - name: Verify installation
        run: |
          which prjct
          prjct 2>&1 | grep -q "Available commands" || exit 1

  test-npm:
    name: Test npm Installation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Test npm installation (local)
        run: |
          npm install
          npm link

      - name: Verify installation
        run: |
          which prjct
          prjct 2>&1 | grep -q "Available commands" || exit 1

      - name: Test package.json scripts
        run: |
          npm run format:check || echo "Formatter check"

  test-verification:
    name: Test Installation Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install globally via bun
        run: |
          bun install
          bun link

      - name: Run verification tests
        run: |
          # Test CLI is available
          which prjct

          # Test CLI runs and shows help
          prjct --help 2>&1 | grep -q "Available commands"

          # Test all core commands exist
          prjct 2>&1 | grep -q "init"
          prjct 2>&1 | grep -q "now"
          prjct 2>&1 | grep -q "done"
          prjct 2>&1 | grep -q "ship"
          prjct 2>&1 | grep -q "next"
          prjct 2>&1 | grep -q "idea"

          echo "✅ CLI installed and all commands verified"

  report-results:
    name: Report Test Results
    runs-on: ubuntu-latest
    needs: [test-bun, test-npm, test-verification]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Test Results Summary:"
          echo "- Bun: ${{ needs.test-bun.result }}"
          echo "- npm: ${{ needs.test-npm.result }}"
          echo "- Verification: ${{ needs.test-verification.result }}"

          # Fail if any test failed
          if [ "${{ needs.test-bun.result }}" != "success" ] || \
             [ "${{ needs.test-npm.result }}" != "success" ] || \
             [ "${{ needs.test-verification.result }}" != "success" ]; then
            echo "❌ Some tests failed"
            exit 1
          fi

          echo "✅ All installation methods tested successfully!"
