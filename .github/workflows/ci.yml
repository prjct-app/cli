name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned via .bun-version (single source): resolving `latest`
          # queries the bun tags API every run — the 500-prone call that
          # broke the v2.42.6 release — and silently drifts from local dev.
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome (lint + format)
        run: bun run check

      - name: Type check
        run: bun run typecheck

      - name: Knip (dead code detection)
        run: bun run knip --include files,duplicates,unlisted,binaries,unresolved

  test:
    name: Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Shards keep each job under the world-class ~45s wall budget.
        shard: [core-a, core-b, core-c]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: npm install

      - name: Run unit shard
        run: |
          set -euo pipefail
          case "${{ matrix.shard }}" in
            core-a)
              bun test --dots \
                core/__tests__/domain \
                core/__tests__/schemas \
                core/__tests__/utils \
                core/__tests__/hooks \
                core/__tests__/packs \
                core/__tests__/mcp \
                core/__tests__/infrastructure \
                core/__tests__/memory \
                core/__tests__/tools \
                core/__tests__/types \
                core/__tests__/statusline \
                core/__tests__/eval \
                core/__tests__/performance
              ;;
            core-b)
              bun test --dots \
                core/__tests__/services \
                core/__tests__/storage
              ;;
            core-c)
              bun test --dots \
                core/__tests__/commands \
                core/__tests__/daemon \
                core/__tests__/workflow-engine \
                core/__tests__/workflow \
                core/__tests__/sync \
                core/__tests__/_setup
              ;;
          esac

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run e2e tests
        run: bun test core/__tests__/e2e/

  platform-compat:
    name: Platform Compatibility (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [quality, test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Platform-focused tests
        run: bun test core/__tests__/daemon/protocol-platform.test.ts core/__tests__/services/hooks-scripts-platform.test.ts

      - name: Build
        run: bun run build

      - name: Package launcher smoke
        run: node bin/prjct.cjs --version
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned via .bun-version (single source): resolving `latest`
          # queries the bun tags API every run — the 500-prone call that
          # broke the v2.42.6 release — and silently drifts from local dev.
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify CLI works
        run: |
          bun link
          prjct --help | grep -q "COMMANDS"
          prjct --version | grep -q "prjct"
          echo "✅ CLI builds and runs correctly"

  install-compat:
    name: Install Compatibility
    runs-on: ubuntu-latest
    needs: [quality, test]
    strategy:
      matrix:
        include:
          - runtime: bun
            version: latest
          # Node 22 is the floor: prjct uses node:sqlite, which needs >=22.5
          # (see package.json engines). Node 20 can't run the CLI without Bun,
          # and we no longer auto-install Bun (MAL-2026-4647).
          - runtime: node
            version: 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.version }}

      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version }}

      - name: Install (Bun)
        if: matrix.runtime == 'bun'
        run: |
          bun install
          bun link

      - name: Install (npm)
        if: matrix.runtime == 'node'
        run: |
          npm install
          npm link

      - name: Verify installation
        run: |
          which prjct
          prjct --help | grep -q "COMMANDS"
          prjct --help | grep -q "init"
          prjct --help | grep -q "sync"
          echo "✅ Installation verified on ${{ matrix.runtime }} ${{ matrix.version }}"
