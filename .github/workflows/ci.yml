name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned via .bun-version (single source): resolving `latest`
          # queries the bun tags API every run — the 500-prone call that
          # broke the v2.42.6 release — and silently drifts from local dev.
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome (lint + format)
        run: bun run check

      - name: Type check
        run: bun run typecheck

      - name: Knip (dead code detection)
        run: bun run knip --include files,duplicates,unlisted,binaries,unresolved

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned via .bun-version (single source): resolving `latest`
          # queries the bun tags API every run — the 500-prone call that
          # broke the v2.42.6 release — and silently drifts from local dev.
          bun-version-file: .bun-version

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned via .bun-version (single source): resolving `latest`
          # queries the bun tags API every run — the 500-prone call that
          # broke the v2.42.6 release — and silently drifts from local dev.
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify CLI works
        run: |
          bun link
          prjct --help | grep -q "COMMANDS"
          prjct --version | grep -q "prjct"
          echo "✅ CLI builds and runs correctly"

  install-compat:
    name: Install Compatibility
    runs-on: ubuntu-latest
    needs: [quality, test]
    strategy:
      matrix:
        include:
          - runtime: bun
            version: latest
          - runtime: node
            version: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.version }}

      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version }}

      - name: Install (Bun)
        if: matrix.runtime == 'bun'
        run: |
          bun install
          bun link

      - name: Install (npm)
        if: matrix.runtime == 'node'
        run: |
          npm install
          npm link

      - name: Verify installation
        run: |
          which prjct
          prjct --help | grep -q "COMMANDS"
          prjct --help | grep -q "init"
          prjct --help | grep -q "sync"
          echo "✅ Installation verified on ${{ matrix.runtime }} ${{ matrix.version }}"
