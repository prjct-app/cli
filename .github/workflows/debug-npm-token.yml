name: Debug NPM Token

# Manual diagnostic — verifies that NPM_TOKEN reaching CI is valid and
# of the right type. Does NOT publish anything. Safe to run as often as
# needed without creating tags or registry artefacts.
#
# Trigger: gh workflow run debug-npm-token.yml --ref main
# Or via the GitHub UI: Actions → Debug NPM Token → Run workflow

on:
  workflow_dispatch:

jobs:
  debug:
    name: Validate token
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure npm with secret
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          echo "::group::npm config (registry only)"
          npm config get registry
          echo "::endgroup::"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Whoami (validates token is recognised)
        run: |
          echo "::group::npm whoami"
          npm whoami || echo "WHOAMI FAILED — token is invalid or expired"
          echo "::endgroup::"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: List tokens (shows the token type for the active account)
        run: |
          echo "::group::npm token list"
          # Each row shows: id | token (masked) | created | readonly | CIDR_whitelist | automation
          # The 'automation' column tells us if this token bypasses 2FA writes.
          npm token list || echo "TOKEN LIST FAILED — token may not have permission to list, or auth failed"
          echo "::endgroup::"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Profile (shows account-level 2FA setting)
        run: |
          echo "::group::npm profile get"
          # 'tfa' field shows 'auth-only' (good for automation) or 'auth-and-writes' (blocks automation)
          npm profile get || echo "PROFILE GET FAILED"
          echo "::endgroup::"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
