name: prjct evals

on:
  workflow_dispatch:
    inputs:
      candidate:
        description: Candidate label to store in eval history. Defaults to the commit SHA.
        required: false
        type: string
      baseline:
        description: Optional baseline label to compare against a previous run.
        required: false
        type: string
      publish:
        description: Publish JSON/Markdown results to the eval-results branch.
        required: true
        default: false
        type: boolean
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: prjct-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Product evals
    runs-on: ubuntu-latest
    env:
      PRJCT_CLI_HOME: ${{ runner.temp }}/prjct-cli-home
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build

      - name: Resolve eval inputs
        id: eval-inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CANDIDATE: ${{ github.event.inputs.candidate }}
          INPUT_BASELINE: ${{ github.event.inputs.baseline }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          candidate="$INPUT_CANDIDATE"
          if [ -z "$candidate" ]; then
            candidate="$GITHUB_SHA_VALUE"
          fi

          should_publish=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_PUBLISH" = "true" ]; then
            should_publish=true
          fi

          {
            echo "candidate=$candidate"
            echo "baseline=$INPUT_BASELINE"
            echo "should_publish=$should_publish"
          } >> "$GITHUB_OUTPUT"

      - name: Run prjct eval
        run: |
          if [ "${{ steps.eval-inputs.outputs.should_publish }}" = "true" ]; then
            node dist/bin/prjct-core.mjs eval run --source ci --candidate "${{ steps.eval-inputs.outputs.candidate }}" --publish --target github --json
          else
            node dist/bin/prjct-core.mjs eval run --source ci --candidate "${{ steps.eval-inputs.outputs.candidate }}" --json
          fi

      - name: Compare against baseline
        if: ${{ github.event_name == 'workflow_dispatch' && steps.eval-inputs.outputs.baseline != '' }}
        run: |
          if [ "${{ steps.eval-inputs.outputs.should_publish }}" = "true" ]; then
            node dist/bin/prjct-core.mjs eval compare --baseline "${{ steps.eval-inputs.outputs.baseline }}" --candidate "${{ steps.eval-inputs.outputs.candidate }}" --publish --target github --json
          else
            node dist/bin/prjct-core.mjs eval compare --baseline "${{ steps.eval-inputs.outputs.baseline }}" --candidate "${{ steps.eval-inputs.outputs.candidate }}" --json
          fi

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prjct-evals-${{ github.run_id }}
          path: ${{ env.PRJCT_CLI_HOME }}/evals/**
          if-no-files-found: error
