name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create tarball
        run: |
          tar -czf prjct-cli-${{ steps.version.outputs.VERSION }}.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='*.log' \
            .

      - name: Generate checksums
        id: checksums
        run: |
          CHECKSUM=$(sha256sum prjct-cli-${{ steps.version.outputs.VERSION }}.tar.gz)
          echo "SHA256=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "$CHECKSUM" > checksums.txt

      - name: Extract changelog
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION=${{ steps.version.outputs.VERSION }}
          NOTES=$(awk "/## \[$VERSION\]|## $VERSION/{flag=1; next} /## \[?[0-9]+\.[0-9]+/{if(flag) exit} flag" CHANGELOG.md 2>/dev/null || echo "See CHANGELOG.md for details.")
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            prjct-cli-${{ steps.version.outputs.VERSION }}.tar.gz
            checksums.txt
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.NOTES }}

            ## Installation

            ### Bun (Recommended)
            ```bash
            bun install -g prjct-cli@${{ steps.version.outputs.VERSION }}
            ```

            ### npm
            ```bash
            npm install -g prjct-cli@${{ steps.version.outputs.VERSION }}
            ```

            ## SHA256 Checksum
            ```
            ${{ steps.checksums.outputs.SHA256 }}
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
