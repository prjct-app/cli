name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create tarball
        run: |
          # Create tarball excluding unnecessary files
          tar -czf prjct-cli-${{ steps.get_version.outputs.VERSION }}.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='website/node_modules' \
            --exclude='.github' \
            --exclude='*.log' \
            .

      - name: Generate checksums
        run: |
          sha256sum prjct-cli-${{ steps.get_version.outputs.VERSION }}.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            prjct-cli-${{ steps.get_version.outputs.VERSION }}.tar.gz
            checksums.txt
          body: |
            ## Installation

            ### npm
            ```bash
            npm install -g @prjct/cli@${{ steps.get_version.outputs.VERSION }}
            ```

            ### Direct download
            ```bash
            curl -fsSL https://prjct.dev/install.sh | bash
            ```

            ## What's Changed
            See [CHANGELOG.md](https://github.com/jlopezlira/prjct-cli/blob/main/CHANGELOG.md) for details.

            ## SHA256 Checksums
            ```
            $(cat checksums.txt)
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
